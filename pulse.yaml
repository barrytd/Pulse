# pulse.yaml
# ----------
# Default settings for Pulse. These are used when you don't pass CLI flags.
# CLI flags always override these values.
#
# Example:
#   If you set format: html here and run "python main.py", you get HTML.
#   If you run "python main.py --format txt", you get TXT (CLI wins).

# Where to look for .evtx log files.
logs: logs

# Report format: txt, html, or json.
format: txt

# Minimum severity to include in the report.
# Options: LOW, MEDIUM, HIGH, CRITICAL
severity: LOW

# Output file path. Set to null to auto-generate a filename.
# Example: output: reports/my_report.html
output: null

# Email delivery - send the finished report automatically after a scan.
# Use --email flag to trigger. Requires these settings to be filled in.
#
# smtp_host: your mail server (e.g. smtp.gmail.com for Gmail)
# smtp_port: 587 for TLS (most common), 465 for SSL
# sender:    the address the email is sent FROM
# recipient: where to send the report
# password:  your email password or app password
#
# Gmail users: generate an App Password at myaccount.google.com/apppasswords
# (required if you have 2-factor authentication enabled)
email:
  smtp_host: smtp.gmail.com
  smtp_port: 587
  sender: perezrobert0235249@gmail.com
  recipient: perezrobert0235249@gmail.com
  password: null

# Live monitor - settings for --watch mode.
monitor:
  interval: 30   # seconds between polls

# Database - Pulse saves every scan to a local SQLite file so you can
# track trends and compare results over time.
# Set path to null to disable database saving entirely.
database:
  path: pulse.db

# Whitelist - suppress known-good items from triggering findings.
# Any finding that matches a whitelisted value is silently removed.
# This reduces false positives in noisy environments.
#
# accounts: usernames to ignore (e.g. service accounts that always fail logins)
# rules:    rule names to skip entirely (e.g. RDP Logon Detected)
# services: service names to ignore (e.g. legitimate services you installed)
# ips:      IP addresses to ignore (e.g. your jump host IP for RDP)
whitelist:
  accounts: []
  rules: []
  services:
    # --- Anti-cheat (installed/removed every time you launch a game) ---
    - vgc                        # Valorant anti-cheat
    - vgk                        # Valorant kernel driver
    - BattlEye Service           # BattlEye anti-cheat
    - BEDaisy                    # BattlEye kernel driver
    - EasyAntiCheat              # Easy Anti-Cheat (Epic)
    - EasyAntiCheat_EOSSys       # Easy Anti-Cheat kernel driver
    - EAAntiCheatService         # EA anti-cheat
    - Player Location Check      # Riot Games service

    # --- Gaming platforms & launchers ---
    - Gaming Services            # Xbox / Microsoft Gaming Services
    - GameInput Redist Service   # Xbox GameInput
    - Battle.net Update Helper   # Blizzard Battle.net
    - Ubisoft UPC Elevation      # Ubisoft Connect

    # --- Hardware monitoring tools ---
    - cpuz154                    # CPU-Z hardware probe
    - cpuz160                    # CPU-Z hardware probe
    - cpuz161                    # CPU-Z hardware probe
    - CAM Service                # NZXT CAM
    - KslD                       # NZXT CAM kernel driver

    # --- Corsair iCUE peripherals ---
    - Corsair                    # matches all Corsair services
    - iCUE                       # Corsair iCUE plugin host

    # --- Razer Synapse peripherals ---
    - Razer                      # matches all Razer services
    - Haptic Service             # Razer haptics

    # --- Google software ---
    - Google Updater             # matches all Google Updater versions
    - Google Play Games          # matches all Google Play Games versions

    # --- Microsoft / system ---
    - Microsoft Office Click-to-Run  # Office updates
    - Chrome Remote Desktop          # Google remote access

    # --- Claude desktop app ---
    - Claude                     # Claude Code / Claude desktop
  ips: []
