services:
  - type: web
    name: pulse
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PULSE_SECRET
        sync: false
      - key: PULSE_ENV
        value: production
      - key: PULSE_ALLOWED_ORIGIN
        sync: false
      # Optional alert channels. Leave unset to disable that channel.
      - key: PULSE_SMTP_HOST
        sync: false
      - key: PULSE_SMTP_PORT
        sync: false
      - key: PULSE_SMTP_USER
        sync: false
      - key: PULSE_SMTP_PASS
        sync: false
      - key: PULSE_SLACK_WEBHOOK
        sync: false
      - key: PULSE_DISCORD_WEBHOOK
        sync: false
